<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content="width=device-width,initial-scale=1.0">
    <title>Anurag Pise - Personal Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/style.css">
    

</head>
<body>

    <!-- Loading animations-->
    <div th:replace="~{fragments/loader :: loader}"></div>

    <!-- Header-->
    <div th:replace="~{fragments/header :: site-header}"></div>

    <!-- hero-->
    <div th:replace="~{fragments/hero :: hero}"></div>

    <!-- about-->
    <div th:replace="~{fragments/about :: about}"></div>

    <!-- projects-->
    <div th:replace="~{fragments/projects :: projects}"></div>

    <!-- achivements-->
    <div th:replace="~{fragments/achievements :: achievements}"></div>

    <!-- contact-->
    <div th:replace="~{fragments/contact :: contact}"></div>

    <!-- footer-->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!--Backgound shapes-->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-1"></div>

    <!-- Custom script file-->

<script src="/JS/script.js"></script>
</body>
</html>
