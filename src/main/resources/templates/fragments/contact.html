<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="contact">

    <section class="section-contact" id="contact">
        <div class="container">
            <div class="section-title-container">
                <h2 class="section-title">Get In Touch</h2>
                <p class="section-subtitle">
                     Contact me...
                </p>
            </div>
            <div class="contact-container">
                <div class="contact-info">
                   <h3 class="contact-heading">Build Something Together..</h3>
                    <p class="contact-text">
                        give info about you...
                    </p>
                    <div class="contact-links">
                        <a href="tel: +917219427190" class="contact-link">
                            <div class="contact-link-icon">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div class="contact-link-text">
                                <span class="contact-link-label">Phone</span>
                                <span class="contact-link-value">+91 7219427190</span>
                            </div>
                        </a>
                    </div>

                    <div class="contact-links">
                        <a href="mailto:anuragpisee@gmail.com" class="contact-link">
                            <div class="contact-link-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="contact-link-text">
                                <span class="contact-link-label">Email</span>
                                <span class="contact-link-value">anuragpisee@gmail.com</span>
                            </div>
                        </a>
                    </div>

                    <div class="contact-links">
                        <a href="https://www.linkedin.com/in/anurag-pise-a3b44b32a" target="_blank" class="contact-link">
                            <div class="contact-link-icon">
                                <i class="fas fa-linkedin"></i>
                            </div>
                            <div class="contact-link-text">
                                <span class="contact-link-label">Linkedin</span>
                                <span class="contact-link-value">Anurag Pise</span>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="contact-form">
                    <form action="https://api.web3forms.com/submit" method="post">
                        <input type="hidden" name="access_key" value="2f653a64-c8af-4549-9170-2dc4c1c9a0a0">
                        <div class="form-group">
                            <label for="name" class="form-label">Your Name</label>
                            <input type="text" id="name" class="form-control" placeholder="John Doe" name="name">
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Your Email</label>
                            <input type="email" id="email" class="form-control" placeholder="john@example.com" name="email">
                        </div>
                        <div class="form-group">
                            <label for="message" class="form-label">Your Message</label>
                            <textarea id="message" class="form-control" placeholder="How can I help you?" name="message"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Send Message <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>



</th:block>
